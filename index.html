<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kareo Calculator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calculator">

    <h1>Kalkulator</h1>

    <input type="text" id="display" value="0" readonly>

    <div class="buttons">

      <!-- BARIS 1 -->
      <button class="red" onclick="clearDisplay()">C</button>
      <button class="black" onclick="appendValue('/')">/</button>
      <button class="black" onclick="appendValue('×')">×</button>
      <button class="black" onclick="appendValue('-')">−</button>

      <!-- BARIS 2 -->
      <button onclick="appendValue('7')">9</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">7</button>
      <button class="black" onclick="appendValue('+')">+</button>

      <!-- BARIS 3 -->
      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>

      <!-- BARIS 4 -->
      <button class="black" onclick="appendValue('÷')">÷</button>
      <button onclick="appendValue('3')">3</button>
      <button onclick="appendValue('2')">2</button>

      <!-- TOMBOL = -->
      <button onclick="appendValue('1')">1</button>
      <button class="equal" onclick="calculate()">=</button>
      
      <!-- BARIS 5 -->
      <button class="black" onclick="appendValue('%')">%</button>
      <button onclick="appendValue('3')">0</button>
      <button class="black" onclick="appendValue(',')">,</button>
    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
